<!doctype html>
<!--
  Standalone FIT/GPX smoke test for the Stride browser bundle.
  Served as a static asset, so it bypasses the Nuxt/Supabase auth routing.
  Visit: http://localhost:3000/fit-test.html
  Safe to delete — not referenced anywhere in the app.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stride — FIT/GPX bundle test</title>
  <style>
    body { font: 15px/1.5 system-ui, sans-serif; max-width: 920px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    .row { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; }
    button, label.btn { padding: .5rem .9rem; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; background: #f6f6f6; }
    pre { background: #0b0b0b; color: #d6e9c6; padding: 1rem; border-radius: 8px; overflow: auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .card { border: 1px solid #e2e2e2; border-radius: 10px; padding: .75rem; }
    canvas { width: 100%; height: 240px; }
    .err { color: #c0392b; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Stride bundle test — FIT &amp; GPX</h1>
  <p>Loads the live <code>/lib/stride.js</code> bundle, then parses + analyses a file entirely in the browser.</p>

  <div class="row">
    <button id="sampleFit">Load sample .fit</button>
    <button id="sampleTcx">Load sample .tcx</button>
    <button id="sampleGpx">Load sample .gpx</button>
    <label class="btn">Choose a real file…<input id="file" type="file" accept=".gpx,.tcx,.fit" hidden></label>
  </div>

  <p id="status"></p>
  <pre id="stats">Pick a file to begin.</pre>

  <div class="grid">
    <div class="card"><canvas id="pace"></canvas></div>
    <div class="card"><canvas id="splits"></canvas></div>
    <div class="card"><canvas id="elev"></canvas></div>
    <div class="card"><canvas id="hr"></canvas></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/lib/stride.js"></script>
  <script>
    const $ = (id) => document.getElementById(id)
    let charts = []
    const setStatus = (m, err) => { const el = $('status'); el.textContent = m; el.className = err ? 'err' : '' }

    function render(act, st) {
      charts.forEach(c => c.destroy()); charts = []
      const f = Stride.formatPace, fd = Stride.formatDistance, fdur = Stride.formatDuration
      $('stats').textContent = JSON.stringify({
        format: act.format, name: act.name, type: act.type, points: act.points.length,
        distance: fd(st.distanceM), movingTime: fdur(st.movingTimeSec), avgPace: f(st.avgPaceSecPerKm),
        bestKm: st.bestKmPaceSecPerKm ? f(st.bestKmPaceSecPerKm) : null,
        elevationGainM: st.elevationGainM, avgHeartRate: st.avgHeartRate, maxHeartRate: st.maxHeartRate,
        avgCadence: st.avgCadence, splits: st.splits.length
      }, null, 2)

      const mk = (canvasId, cfg) => { if (!cfg) return; cfg.options = { ...(cfg.options || {}), maintainAspectRatio: false }; charts.push(new Chart($(canvasId), cfg)) }
      mk('pace', Stride.paceChartConfig(act, st))
      mk('splits', Stride.splitsChartConfig(st))
      mk('elev', Stride.elevationChartConfig(act, st))
      if (st.hrZones) mk('hr', Stride.heartRateChartConfig(act, st))
    }

    function run(input, label) {
      try {
        setStatus('Parsing ' + label + '…')
        const act = Stride.parse(input)
        const st = Stride.analyze(act)
        render(act, st)
        setStatus('OK — parsed ' + label + ' as ' + act.format.toUpperCase())
      } catch (e) {
        setStatus(e.message || String(e), true)
        $('stats').textContent = (e && e.stack) || String(e)
      }
    }

    $('sampleFit').onclick = async () => {
      const buf = await (await fetch('/demo/sample-run.fit')).arrayBuffer()
      run(new Uint8Array(buf), 'sample-run.fit')
    }
    $('sampleTcx').onclick = async () => {
      const txt = await (await fetch('/demo/sample-run.tcx')).text()
      run(txt, 'sample-run.tcx')
    }
    $('sampleGpx').onclick = async () => {
      const txt = await (await fetch('/demo/sample-run.gpx')).text()
      run(txt, 'sample-run.gpx')
    }
    $('file').onchange = (e) => {
      const file = e.target.files[0]; if (!file) return
      const r = new FileReader()
      r.onerror = () => setStatus('Could not read file', true)
      if (/\.fit$/i.test(file.name)) { r.onload = () => run(new Uint8Array(r.result), file.name); r.readAsArrayBuffer(file) }
      else { r.onload = () => run(String(r.result), file.name); r.readAsText(file) }
    }

    if (!window.Stride) setStatus('Stride bundle failed to load from /lib/stride.js', true)
  </script>
</body>
</html>
